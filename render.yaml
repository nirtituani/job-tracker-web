services:
  - type: web
    name: job-tracker
    runtime: python
    buildCommand: bash backend/build.sh
    startCommand: cd backend && gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: /data/database.db
    disk:
      name: db
      mountPath: /data
      sizeGB: 1
